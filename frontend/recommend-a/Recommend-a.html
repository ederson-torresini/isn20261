<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Recommend·a — Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<style>
  /* Fullscreen prototype mode (canvas hidden) */
  body.prototype-mode #canvas-root { display: none; }
  body.prototype-mode #fullscreen-root { display: block !important; }
</style>
</head>
<body>
<div id="canvas-root"></div>
<div id="fullscreen-root" style="display:none; position:fixed; inset:0;"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="preferences.jsx"></script>
<script type="text/babel" src="history-queue.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#f5b544",
  "accentHover": "#ffc560",
  "bgTone": "neutral",
  "heroVariant": "collage",
  "showTweaks": true
}/*EDITMODE-END*/;

const BG_TONES = {
  neutral: { bg: '#0a0a0b', surface: '#131316', surfaceElevated: '#1c1c20', border: '#2a2a30', borderStrong: '#3a3a42' },
  warm:    { bg: '#0c0a08', surface: '#16130f', surfaceElevated: '#201b14', border: '#2c261d', borderStrong: '#3e3526' },
  cool:    { bg: '#08090b', surface: '#101218', surfaceElevated: '#181b22', border: '#22262e', borderStrong: '#323742' },
  truebk:  { bg: '#000000', surface: '#0c0c0e', surfaceElevated: '#16161a', border: '#222227', borderStrong: '#323239' },
};

function applyTokens(t) {
  const root = document.documentElement;
  root.style.setProperty('--color-accent', t.accent);
  root.style.setProperty('--color-accent-hover', t.accentHover);
  // Soft accent tint
  const m = t.accent.match(/#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i);
  if (m) {
    const r = parseInt(m[1],16), g = parseInt(m[2],16), b = parseInt(m[3],16);
    root.style.setProperty('--color-accent-soft', `rgba(${r},${g},${b},0.12)`);
    // pick light/dark on-accent text
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
    root.style.setProperty('--color-on-accent', lum > 0.6 ? '#1a1305' : '#fff8ec');
  }
  const tone = BG_TONES[t.bgTone] || BG_TONES.neutral;
  root.style.setProperty('--color-bg', tone.bg);
  root.style.setProperty('--color-surface', tone.surface);
  root.style.setProperty('--color-surface-elevated', tone.surfaceElevated);
  root.style.setProperty('--color-border', tone.border);
  root.style.setProperty('--color-border-strong', tone.borderStrong);
}

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => { applyTokens(t); }, [t.accent, t.accentHover, t.bgTone]);

  // Frame helpers
  const Frame = ({ children, w, h, mobile }) => (
    <div style={{
      width: w, height: h, background: 'var(--color-bg)',
      borderRadius: mobile ? 32 : 14,
      overflow: 'hidden', position: 'relative',
      boxShadow: '0 30px 80px rgba(0,0,0,.4)',
      border: '1px solid var(--color-border)',
    }}>
      {children}
    </div>
  );

  const D_W = 1280, D_H = 800;   // desktop artboard
  const M_W = 390,  M_H = 780;   // mobile artboard
  const A_W = 460,  A_H = 700;   // auth artboard
  const P_W = 1024, P_H = 700;   // pref/library

  return (
    <>
      <DesignCanvas>
        <DCSection id="brand" title="Recommend·a" subtitle="Cinephile movie recommendation app · concept">
          <DCArtboard id="readme" label="Brief & system" width={520} height={700}>
            <Readme/>
          </DCArtboard>
        </DCSection>

        <DCSection id="home" title="Homepage" subtitle="The single most important screen — three hero variants">
          <DCArtboard id="home-collage" label="A · Blurred poster collage (default)" width={D_W} height={D_H}>
            <Frame w={D_W} h={D_H}>
              <PrototypeApp initialScreen="home" initialLoggedIn={true} heroVariant="collage"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-drift" label="B · Drifting reel" width={D_W} height={D_H}>
            <Frame w={D_W} h={D_H}>
              <PrototypeApp initialScreen="home" initialLoggedIn={true} heroVariant="drift"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-gradient" label="C · Ambient gradient (no imagery)" width={D_W} height={D_H}>
            <Frame w={D_W} h={D_H}>
              <PrototypeApp initialScreen="home" initialLoggedIn={true} heroVariant="gradient"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-loggedout" label="Logged-out · sign-up nudge" width={D_W} height={D_H}>
            <Frame w={D_W} h={D_H}>
              <PrototypeApp initialScreen="home" initialLoggedIn={false} heroVariant="collage"/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="home-mobile" label="Mobile · home" width={M_W} height={M_H}>
            <Frame w={M_W} h={M_H} mobile>
              <PrototypeApp initialScreen="home" initialLoggedIn={true} isMobile={true}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="detail" title="Recommendation result" subtitle="Cinematic reveal — backdrop, match %, where to watch">
          <DCArtboard id="detail-desktop" label="Desktop" width={D_W} height={D_H}>
            <Frame w={D_W} h={D_H}>
              <PrototypeApp initialScreen="detail" initialLoggedIn={true}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="detail-mobile" label="Mobile" width={M_W} height={M_H}>
            <Frame w={M_W} h={M_H} mobile>
              <PrototypeApp initialScreen="detail" initialLoggedIn={true} isMobile={true}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="auth" title="Auth" subtitle="Login, register, password recovery — same shell">
          <DCArtboard id="login" label="Sign in" width={A_W} height={A_H}>
            <Frame w={A_W} h={A_H}>
              <PrototypeApp initialScreen="login" initialLoggedIn={false}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="register" label="Create account" width={A_W} height={A_H}>
            <Frame w={A_W} h={A_H}>
              <PrototypeApp initialScreen="register" initialLoggedIn={false}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="forgot" label="Reset · 3 states (click button to step through)" width={A_W} height={A_H}>
            <Frame w={A_W} h={A_H}>
              <PrototypeApp initialScreen="forgot" initialLoggedIn={false}/>
            </Frame>
          </DCArtboard>
        </DCSection>

        <DCSection id="library" title="Library" subtitle="Preferences, history, watch later queue">
          <DCArtboard id="prefs" label="Preferences" width={P_W} height={P_H}>
            <Frame w={P_W} h={P_H}>
              <PrototypeApp initialScreen="preferences" initialLoggedIn={true}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="history" label="History" width={P_W} height={P_H}>
            <Frame w={P_W} h={P_H}>
              <PrototypeApp initialScreen="history" initialLoggedIn={true}/>
            </Frame>
          </DCArtboard>
          <DCArtboard id="queue" label="Watch later · drag-to-reorder" width={P_W} height={P_H}>
            <Frame w={P_W} h={P_H}>
              <PrototypeApp initialScreen="queue" initialLoggedIn={true}/>
            </Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Accent" />
        <TweakColor label="Primary" value={t.accent} onChange={v => setTweak({accent: v, accentHover: lightenHex(v, 0.08)})}/>
        <TweakRadio label="Preset" value={null} options={['amber','crimson','violet','mint','ember']}
          onChange={v => {
            const map = {
              amber:   { a: '#f5b544', h: '#ffc560' },
              crimson: { a: '#e5484d', h: '#f55a5f' },
              violet:  { a: '#7c5cff', h: '#9577ff' },
              mint:    { a: '#3ee0a8', h: '#5ce9b8' },
              ember:   { a: '#ff6a3d', h: '#ff8358' },
            };
            const c = map[v]; if (c) setTweak({accent: c.a, accentHover: c.h});
          }}/>
        <TweakSection label="Background tone" />
        <TweakRadio label="Tone" value={t.bgTone} options={['neutral','warm','cool','truebk']}
          onChange={v => setTweak('bgTone', v)}/>
      </TweaksPanel>
    </>
  );
}

function lightenHex(hex, amt) {
  const m = hex.match(/#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i);
  if (!m) return hex;
  const c = [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)]
    .map(v => Math.min(255, Math.round(v + (255 - v) * amt)))
    .map(v => v.toString(16).padStart(2,'0'));
  return '#' + c.join('');
}

function Readme() {
  return (
    <div style={{
      width: '100%', height: '100%', overflow: 'auto', padding: 28,
      background: 'var(--color-bg)', color: 'var(--color-text-primary)',
      fontFamily: 'var(--font-body)',
    }} className="no-scrollbar">
      <div style={{ marginBottom: 20 }}><BrandMark size={32}/></div>
      <h1 className="display" style={{ margin: 0, fontSize: 30, fontWeight: 800 }}>One button. One movie.</h1>
      <p style={{ color: 'var(--color-text-secondary)', fontSize: 14, lineHeight: 1.55 }}>
        A premium-streaming-style recommendation app. Big hero, single CTA, cinematic reveal.
        Original brand & visual identity — not a copy of any existing service.
      </p>
      <Sec title="System">
        <Row k="Brand" v="Recommend·a"/>
        <Row k="Type" v="Manrope (display 700–900) · Inter (body 400–500)"/>
        <Row k="Accent" v="Amber oklch(0.78 0.15 75) — tweakable"/>
        <Row k="Layout" v="Desktop 64px left rail · Mobile 5-tab bottom bar"/>
        <Row k="Imagery" v="Picsum stand-ins (deterministic seeds)"/>
      </Sec>
      <Sec title="What's interactive">
        <Bullet>Hit "Pick a movie for me" → 1.2s search → fade reveal of the detail screen</Bullet>
        <Bullet>Save / unsave movies → toast confirmation</Bullet>
        <Bullet>"Recommend another" rerolls live</Bullet>
        <Bullet>Login / register / 3-state forgot flow with validation</Bullet>
        <Bullet>Watch later: drag posters to reorder, X to remove, "Surprise me" picks one</Bullet>
        <Bullet>Nav rail / mobile tab bar fully wired between screens</Bullet>
      </Sec>
      <Sec title="Tweak the system">
        <p style={{ color: 'var(--color-text-secondary)', fontSize: 12, margin: 0 }}>
          Toggle the Tweaks panel from the toolbar. Swap the accent (try violet or mint —
          the UI re-balances), shift the background tone (true black, warm, cool).
          All colors are CSS custom properties; no accent-baked-into-gradient hacks.
        </p>
      </Sec>
    </div>
  );
}
function Sec({title, children}) {
  return (
    <div style={{ marginTop: 22 }}>
      <div className="eyebrow" style={{ marginBottom: 8 }}>{title}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, fontSize: 13 }}>{children}</div>
    </div>
  );
}
function Row({k,v}) {
  return (
    <div style={{ display: 'flex', gap: 12, paddingBottom: 6, borderBottom: '1px solid var(--color-border)' }}>
      <div style={{ width: 80, color: 'var(--color-text-muted)', fontSize: 12 }}>{k}</div>
      <div style={{ flex: 1, color: 'var(--color-text-primary)' }}>{v}</div>
    </div>
  );
}
function Bullet({children}) {
  return (
    <div style={{ display: 'flex', gap: 10, color: 'var(--color-text-secondary)', lineHeight: 1.5 }}>
      <span style={{ color: 'var(--color-accent)', flexShrink: 0 }}>›</span>
      <span>{children}</span>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('canvas-root'));
root.render(<Root/>);
</script>
</body>
</html>
