services:
  rest-api:
    image: node
    working_dir: /app
    volumes:
      - ./rest-api:/app
    command: npm start
  http-proxy:
    depends_on:
      - rest-api
    image: nginx
    ports:
      - 8080:80
    volumes:
      - ./http-proxy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./http-proxy/static:/usr/share/nginx/html
